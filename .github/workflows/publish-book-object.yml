name: Publish Book Object

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build:book-object

      - name: Publish @parallel-ui/book-object
        run: npm publish -w @parallel-ui/book-object --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
